moin-melder {
  stream-url = "https://streams.rsh.de/rsh-live/mp3-192/streams.rsh.de/"

  trigger-words = ["heiligenhafen", "tss", "schulverein"]
  # Mindestens 2 der Trigger-Wörter müssen in einem Satz vorkommen
  min-trigger-matches = 2

  schedule {
    target-hour = 7
    target-minute = 0
    # ± window-minutes um die Zielzeit
    window-minutes = 5
  }

  whatsapp {
    group-name = "Operation Wildpark"
    session-dir = "/data/whatsapp-session"
    headless = false
  }

  vosk {
    model-path = "/data/vosk-model"
  }
}
